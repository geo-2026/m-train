# Render.com Blueprint — M-TRAIN 클라우드 배포 설정
# Render 대시보드에서 "New + → Blueprint"로 이 저장소를 연결하면 자동으로 읽힙니다.
services:
  - type: web
    name: m-train
    runtime: node
    plan: free
    region: singapore     # 한국에서 가장 가까운 무료 리전
    rootDir: app          # 앱 코드는 app/ 폴더에 있습니다
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    healthCheckPath: /api/config
    envVars:
      - key: NODE_VERSION
        value: "22"
